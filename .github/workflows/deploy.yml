name: Deploy Express API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/docker-cicd-learning
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build \
            --build-arg APP_VERSION=${IMAGE_TAG} \
            -t ${IMAGE_NAME}:latest \
            -t ${IMAGE_NAME}:${IMAGE_TAG} .

          docker push ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:${IMAGE_TAG}

      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD,DOCKER_IMAGE,IMAGE_TAG
          script: |
            set -e
            cd /docker-cicd-learning

            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            cat > docker-compose.deploy.yml <<EOF
            services:
              api:
                image: ${DOCKER_IMAGE}:${IMAGE_TAG}
                container_name: docker-cicd-learning
                restart: unless-stopped
                ports:
                  - "8000:8000"
                env_file:
                  - .env
            EOF

            docker compose -f docker-compose.deploy.yml pull api

            docker compose -f docker-compose.deploy.yml up -d --force-recreate --remove-orphans api

            docker image prune -af

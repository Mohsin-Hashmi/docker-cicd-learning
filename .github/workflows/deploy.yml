name: Deploy Express API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build \
            -t ${{secrets.DOCKER_USERNAME}}/docker-cicd-learning:latest \
            -t ${{secrets.DOCKER_USERNAME}}/docker-cicd-learning:${{ github.sha }} .

          docker push ${{secrets.DOCKER_USERNAME}}/docker-cicd-learning:latest
          docker push ${{secrets.DOCKER_USERNAME}}/docker-cicd-learning:${{ github.sha }}

      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /docker-cicd-learning

            docker compose pull

            docker compose up -d --force-recreate

            docker image prune -af